name: Arb Scanner

on:
  schedule:
    # 08:30–08:55 CET (07:30–07:55 UTC) — avvio mattina
    - cron: '30,35,40,45,50,55 7 * * *'
    # 09:00–23:55 CET (08:00–22:55 UTC) — piena operatività, ogni 5 min
    - cron: '*/5 8-22 * * *'
    # 00:00 CET (23:00 UTC) — ultimo check serale
    - cron: '0 23 * * *'
  workflow_dispatch:    # run manuale dall'app GitHub su iPhone

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python arb_scanner.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
