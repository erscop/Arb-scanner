name: Arb Scanner

on:
  schedule:
    - cron: '30,35,40,45,50,55 7 * * *'
    - cron: '*/5 8-22 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python arb_scanner.py
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
